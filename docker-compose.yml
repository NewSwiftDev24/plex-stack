services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 6881:6881
      - 6881:6881/udp
      - 8888:8888/tcp
      - 8005:8005
      - 8120:8120
      - 8989:8989
      - 7878:7878
      - 8191:8191
      - 9696:9696
      - 32400:32400
    volumes:
      - ./data/gluetun:/gluetun
      - ./data/gluetun/temp:/tmp/gluetun
    environment:
      - TZ=${TIME_ZONE:?err}
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER:?err}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:?err}
      - SERVER_COUNTRIES=United States
      - SERVER_CITIES=Dallas
      - SERVER_CATEGORIES=P2P
    # networks:
    #  - gluetun

  qbittorrent: 
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    volumes: 
      - ./data/qbittorrent:/config
      - ~/tmp/plex/downloads:/downloads
    environment: 
      - WEBUI_PORT=8120
      - TZ=${TIME_ZONE:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=022
    network_mode: "service:gluetun"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - ./data/sonarr/config:/config
      - ~/tmp/plex/downloads:/downloads
      - ~/tmp/plex/tv:/tv
    environment:
      - TZ=${TIME_ZONE:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=022
    network_mode: "service:gluetun"
    restart: unless-stopped
  
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - ./data/radarr/config:/config
      - ~/tmp/plex/downloads:/downloads
      - ~/tmp/plex/movies:/movies
    environment:
      - TZ=${TIME_ZONE:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=022
    network_mode: "service:gluetun"
    restart: unless-stopped
  
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - ./data/prowlarr/config:/config
    environment:
      - TZ=${TIME_ZONE:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=022
    network_mode: "service:gluetun"
    restart: unless-stopped

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    restart: unless-stopped
    network_mode: "service:gluetun"

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    volumes:
      - ./data/plex/config:/config
      - ~/tmp/plex/movies:/movies
      - ~/tmp/plex/tv:/tv
    environment:
      - TZ=${TIME_ZONE:?err}
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - UMASK=022
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:?err}
    network_mode: "service:gluetun"
    restart: unless-stopped
